name: Deploy to GitHub Pages

# Запускается на каждый push в main/master — собирает статику и публикует на Pages.
on:
  push:
    branches: [main, master]
  workflow_dispatch: # можно запустить вручную из вкладки Actions

permissions:
  contents: read
  pages: write
  id-token: write

# Параллельные деплои не нужны — отменяем предыдущий, если пушнули снова.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build

      # Next.js export кладёт сайт в out/. Отключаем Jekyll, иначе он съест папки с _подчёркиванием (_next).
      - name: Disable Jekyll
        run: touch out/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
