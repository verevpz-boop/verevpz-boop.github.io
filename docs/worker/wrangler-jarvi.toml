# Джарви-мозг (failover-цепочка Cerebras→Groq→Mistral→Gemini).
# Деплой:  npx wrangler deploy -c wrangler-jarvi.toml
# Секреты: npx wrangler secret put <NAME> --config wrangler-jarvi.toml
#   CEREBRAS_API_KEY, GROQ_API_KEY, MISTRAL_API_KEY, GEMINI_API_KEY
name = "jarvi-brain"
main = "jarvi-brain.js"
compatibility_date = "2026-01-01"
workers_dev = true

# Workers AI — для /stt (Whisper @cf/openai/whisper-large-v3-turbo).
# Слух Джарви: браузер шлёт аудио-кусок (WAV base64) → Whisper на edge-GPU → текст.
# Бесплатный тариф 10 000 нейронов/сутки, тот же аккаунт. Биндинг включается этой строкой.
[ai]
binding = "AI"
